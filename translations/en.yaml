---
# Home Assistant app option names/descriptions shown in the Configuration tab.
# https://developers.home-assistant.io/docs/add-ons/configuration#translating-add-on-options
#
# `tasks` is a nested list of objects (name/api_key/type/port/model/...) --
# Supervisor's per-field translation for nested list items isn't
# well-documented, so this single description covers the whole structure
# rather than assuming each nested field gets its own tooltip.
configuration:
    debug:
        name: Debug logging
        description: Show verbose logs for troubleshooting.
    tasks:
        name: Tasks
        description: >-
            One or more independent speech tasks, each its own OpenRouter
            model and its own Wyoming port (10300-10319) -- add one "Wyoming
            Protocol" integration entry per task in Home Assistant.
            Fields: name (any label, used in logs and Home Assistant sensor
            entity IDs); api_key (your OpenRouter API key -- reuse the same
            key across tasks by repeating it, or use different keys per
            task); type (stt or tts); port (10300-10319, must be unique);
            model (any OpenRouter model slug -- check this app's log tab
            after startup for the live STT/TTS model catalog and current
            prices); timeout (HTTP timeout in seconds). STT-only: language
            (advertised to Home Assistant's UI), default_language (hint sent
            to OpenRouter only when a request doesn't specify one; leave
            empty to auto-detect), temperature (0-1, sampling parameter).
            TTS-only: voice (required -- valid values are model-specific,
            see the model catalog), speed (playback speed multiplier),
            audio_format (pcm or mp3 -- pcm needs no local decoding but not
            every model supports it; mp3 is smaller to transfer but is
            decoded locally via mpg123 before Wyoming delivery, which always
            needs raw PCM regardless of this setting). Advanced: provider
            (raw JSON string, passed through as OpenRouter's "provider"
            field, e.g. for provider routing or Azure TTS style options).
network:
    10300/tcp: Task port (if configured)
    10301/tcp: Task port (if configured)
    10302/tcp: Task port (if configured)
    10303/tcp: Task port (if configured)
